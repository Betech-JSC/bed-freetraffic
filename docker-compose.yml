version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: freetraffic_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: freetraffic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: freetraffic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend-api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: freetraffic_backend_api
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/freetraffic?sslmode=disable
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GA4_PROPERTY_ID=${GA4_PROPERTY_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ZALO_APP_ID=${ZALO_APP_ID}
      - ZALO_APP_SECRET=${ZALO_APP_SECRET}
    restart: unless-stopped

  backend-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: freetraffic_backend_worker
    depends_on:
      - postgres
      - redis
    command: ["node", "dist/src/worker-entry.js"]
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/freetraffic?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ZALO_APP_ID=${ZALO_APP_ID}
      - ZALO_APP_SECRET=${ZALO_APP_SECRET}
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    container_name: freetraffic_frontend
    depends_on:
      - backend-api
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
